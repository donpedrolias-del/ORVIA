<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORVIA - ⚽ Football Manager</title>
    <style>
        
            body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
            .container { max-width: 800px; margin: 0 auto; }
            .card { background: white; border-radius: 24px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
            h1 { color: #667eea; margin-bottom: 20px; }
            input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; margin: 10px 0; font-size: 16px; }
            button { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; width: 100%; }
            button:hover { background: #764ba2; }
            .item { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
            .delete-btn { background: #dc3545; padding: 5px 10px; width: auto; }
            .stats { display: flex; gap: 20px; margin: 20px 0; }
            .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; border-radius: 15px; flex: 1; text-align: center; }
            .stat-card h3 { font-size: 2rem; }
            
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { body { padding: 10px; } .card { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card fade-in">
            <h1>⚽ ⚽ Football Manager</h1>
            <p>On peu travail sur mon application de football</p>
            <div class="stats">
                <div class="stat-card"><h3 id="total">0</h3><p>Éléments</p></div>
                <div class="stat-card"><h3 id="apiStatus">...</h3><p>API</p></div>
            </div>
            <input type="text" id="itemInput" placeholder="Ajouter un élément...">
            <button onclick="addItem()">Ajouter</button>
            <div id="itemsList"></div>
            <p style="margin-top: 20px; font-size: 12px; text-align: center; opacity: 0.7;">🎨 Design Moderne par ORVIA Designer</p>
        </div>
    </div>
    <script>
        const API_URL = 'http://127.0.0.1:5002';
        let items = [];
        
        async function checkAPI() {
            try {
                const response = await fetch(API_URL + '/api/status');
                if (response.ok) {
                    document.getElementById('apiStatus').textContent = '✅ Online';
                    return true;
                }
            } catch(e) {
                document.getElementById('apiStatus').textContent = '❌ Offline';
            }
            return false;
        }
        
        async function loadItems() {
            try {
                const response = await fetch(API_URL + '/api/items');
                const data = await response.json();
                items = data.items;
                document.getElementById('total').textContent = items.length;
                const container = document.getElementById('itemsList');
                if (items.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:#999;">📭 Aucun élément</p>';
                    return;
                }
                let html = '';
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    html += '<div class="item"><div><strong>#' + item.id + '</strong> ' + (item.data ? (item.data.value || item.data) : '') + '<br><small>' + new Date(item.created_at).toLocaleString() + '</small></div><button class="delete-btn" onclick="deleteItem(' + item.id + ')">🗑️</button></div>';
                }
                container.innerHTML = html;
            } catch(e) {
                console.log('Mode démo');
            }
        }
        
        async function addItem() {
            const input = document.getElementById('itemInput');
            const value = input.value.trim();
            if (!value) return;
            
            try {
                const response = await fetch(API_URL + '/api/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value: value })
                });
                if (response.ok) {
                    input.value = '';
                    loadItems();
                }
            } catch(e) {
                const newItem = { id: Date.now(), data: { value: value }, created_at: new Date().toISOString() };
                items.push(newItem);
                document.getElementById('total').textContent = items.length;
                let html = '';
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    html += '<div class="item"><div><strong>#' + item.id + '</strong> ' + (item.data ? (item.data.value || item.data) : '') + '<br><small>' + new Date(item.created_at).toLocaleString() + '</small></div><button class="delete-btn" onclick="deleteItem(' + item.id + ')">🗑️</button></div>';
                }
                document.getElementById('itemsList').innerHTML = html;
                input.value = '';
            }
        }
        
        async function deleteItem(id) {
            try {
                await fetch(API_URL + '/api/items/' + id, { method: 'DELETE' });
                loadItems();
            } catch(e) {
                items = items.filter(i => i.id !== id);
                document.getElementById('total').textContent = items.length;
                let html = '';
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    html += '<div class="item"><div><strong>#' + item.id + '</strong> ' + (item.data ? (item.data.value || item.data) : '') + '<br><small>' + new Date(item.created_at).toLocaleString() + '</small></div><button class="delete-btn" onclick="deleteItem(' + item.id + ')">🗑️</button></div>';
                }
                document.getElementById('itemsList').innerHTML = html;
            }
        }
        
        checkAPI();
        loadItems();
        setInterval(function() { checkAPI(); loadItems(); }, 3000);
    </script>
</body>
</html>
