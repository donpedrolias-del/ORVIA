<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORVIA - site de comptabilité avec accueil inform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #667eea; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin: 10px 0;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #764ba2; }
        .item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
        }
        .delete-btn { background: #dc3545; padding: 5px 10px; width: auto; }
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 15px;
            flex: 1;
            text-align: center;
        }
        .stat-card h3 { font-size: 2rem; }
        @media (max-width: 768px) { .stats { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card"><h1>✨ site de comptabilité avec accueil information développement</h1><p>Généré par ORVIA</p></div>
        <div class="card">
            <div class="stats"><div class="stat-card"><h3 id="total">0</h3><p>Éléments</p></div><div class="stat-card"><h3 id="apiStatus">...</h3><p>API</p></div></div>
            <input type="text" id="inputData" placeholder="Ajouter..."><button onclick="addItem()">Ajouter</button>
            <div id="itemsList"></div>
        </div>
    </div>
    <script>
        const API_URL = 'http://127.0.0.1:5002';
        let items = [];
        async function checkAPI() {
            try { const r=await fetch(API_URL+'/api/status'); if(r.ok) document.getElementById('apiStatus').textContent='✅ Online'; } catch(e){ document.getElementById('apiStatus').textContent='❌ Offline'; }
        }
        async function loadItems() {
            try { const r=await fetch(API_URL+'/api/items'); const d=await r.json(); items=d.items; document.getElementById('total').textContent=items.length;
            const c=document.getElementById('itemsList'); if(items.length===0) c.innerHTML='<p style="text-align:center;">📭 Aucun élément</p>';
            else { let h=''; for(let i=0;i<items.length;i++){ const it=items[i]; h+='<div class="item"><div><strong>#'+it.id+'</strong> '+(it.data?(it.data.value||it.data):'')+'<br><small>'+new Date(it.created_at).toLocaleString()+'</small></div><button class="delete-btn" onclick="deleteItem('+it.id+')">🗑️</button></div>'; } c.innerHTML=h; }
            } catch(e){ console.error(e); }
        }
        async function addItem() {
            const i=document.getElementById('inputData'), v=i.value.trim(); if(!v) return;
            try { const r=await fetch(API_URL+'/api/items',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:v})}); if(r.ok){ i.value=''; loadItems(); } }
            catch(e){ const ni={id:Date.now(),data:{value:v},created_at:new Date().toISOString()}; items.push(ni); document.getElementById('total').textContent=items.length;
            let h=''; for(let i=0;i<items.length;i++){ const it=items[i]; h+='<div class="item"><div><strong>#'+it.id+'</strong> '+(it.data?(it.data.value||it.data):'')+'<br><small>'+new Date(it.created_at).toLocaleString()+'</small></div><button class="delete-btn" onclick="deleteItem('+it.id+')">🗑️</button></div>'; } document.getElementById('itemsList').innerHTML=h; i.value=''; }
        }
        async function deleteItem(id) {
            try { await fetch(API_URL+'/api/items/'+id,{method:'DELETE'}); loadItems(); }
            catch(e){ items=items.filter(i=>i.id!==id); document.getElementById('total').textContent=items.length;
            let h=''; for(let i=0;i<items.length;i++){ const it=items[i]; h+='<div class="item"><div><strong>#'+it.id+'</strong> '+(it.data?(it.data.value||it.data):'')+'<br><small>'+new Date(it.created_at).toLocaleString()+'</small></div><button class="delete-btn" onclick="deleteItem('+it.id+')">🗑️</button></div>'; } document.getElementById('itemsList').innerHTML=h; }
        }
        checkAPI(); loadItems(); setInterval(()=>{ checkAPI(); loadItems(); },3000);
    </script>
</body>
</html>
